<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<title>Para Jaqueline ❤️</title>

<style>
html,body{
    margin:0;
    height:100%;
    background:#02020a;
    overflow:hidden;
    font-family:'Poppins', sans-serif;
    color:white;
}

/* 🌌 ESTRELLAS */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(2px 2px at 10% 20%, white, transparent),
    radial-gradient(2px 2px at 80% 30%, white, transparent),
    radial-gradient(1.5px 1.5px at 50% 70%, white, transparent),
    radial-gradient(2px 2px at 30% 80%, white, transparent);
    animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

/* 🔥 BOOST DE ESTRELLAS */
.stars.boost{
    animation:twinkleBoost 0.4s infinite alternate;
    filter:brightness(2.5);
}
@keyframes twinkleBoost{
    from{opacity:0.6;}
    to{opacity:1;}
}

/* 🌠 FUGACES */
.shooting-star{
    position:fixed;
    width:140px;
    height:2px;
    background:linear-gradient(90deg, white, transparent);
    transform:rotate(45deg);
    animation:shoot 1s linear;
}
@keyframes shoot{
    to{transform:translate(500px,500px) rotate(45deg); opacity:0;}
}

/* PANTALLAS */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.8s ease;
}
.screen.active{
    opacity:1;
    pointer-events:auto;
}

/* BOTÓN */
.btn{
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
}

/* TEXTO */
.bigText{
    font-family:'Great Vibes', cursive;
    font-size:38px;
}

/* CARTA */
.carta{
    width:85%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    line-height:1.7;
    text-shadow:0 0 8px rgba(255,255,255,0.3);
}

/* NOMBRE */
.glowName{
    font-family:'Great Vibes', cursive;
    font-size:22px;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff4d6d,
        0 0 30px #ff4d6d;
}

/* 🪐 SATURNO */
#saturn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:140px;
    height:140px;
    z-index:9999;
    cursor:pointer;
}

.planet{
    width:100%;
    height:100%;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #ffd27f, #c79b4b);
    box-shadow:
        0 0 20px rgba(255,200,120,0.8),
        0 0 60px rgba(255,200,120,0.4);
}

.ring{
    position:absolute;
    width:200px;
    height:60px;
    border:5px solid rgba(255,215,150,0.7);
    border-radius:50%;
    top:40px;
    left:-30px;
    transform:rotateX(65deg);
    animation:ring 6s linear infinite;
}
@keyframes ring{
    to{transform:rotateX(65deg) rotate(360deg);}
}

/* ✨ CLICK */
.spark{
    position:absolute;
    font-size:20px;
    animation:boom 1s forwards;
}
@keyframes boom{
    to{transform:scale(2); opacity:0;}
}

/* 💥 SUPER BRILLOS */
.superSpark{
    position:fixed;
    font-size:22px;
    animation:superBoom 1.2s ease-out forwards;
    pointer-events:none;
}

@keyframes superBoom{
    from{
        transform:scale(0.5);
        opacity:0;
    }
    30%{opacity:1;}
    to{
        transform:translate(var(--x), var(--y)) scale(1.5);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="stars"></div>

<div id="s1" class="screen active">
<button class="btn" onclick="start()">Presiona para leer tu carta ❤️</button>
</div>

<div id="s2" class="screen">
<div class="bigText">Feliz primer año mi amor ❤️</div>
<button class="btn" onclick="next()">Siguiente</button>
</div>

<div id="s3" class="screen">
<div class="carta" id="texto"></div>
</div>

<!-- 🪐 SATURNO -->
<div id="saturn">
    <div class="ring"></div>
    <div class="planet"></div>
</div>

<script>

function start(){
    s1.classList.remove("active");
    s2.classList.add("active");
}

function next(){
    s2.classList.remove("active");
    s3.classList.add("active");
    escribir();
}

/* TEXTO */
const partes = [
"Hola <span class='glowName'>Jaqueline</span>, soy Ale,<br><br>",
"¿Sabes cuánto te amo?<br>",
"¿Sabes todo lo que daría por ti?<br><br>",
"Si no es así, permíteme seguir esforzándome durante más tiempo,<br>",
"si no es suficiente este año que ya pasamos juntos,<br>",
"ten por seguro que habrá muchos más,<br><br>",
"porque es contigo con quien quiero estar,<br>",
"amo todo de ti,<br>",
"y te amo con mi corazón plenamente,<br><br>",
"hasta Saturno ❤️<br><br>",
"<b>Att: Tu Ale</b>"
];

function escribir(){
    let cont = document.getElementById("texto");
    let i = 0;

    function loop(){
        if(i < partes.length){
            cont.innerHTML += partes[i];
            i++;
            setTimeout(loop, 120);
        }
    }
    loop();
}

/* 🌠 FUGACES */
setInterval(()=>{
    let s=document.createElement("div");
    s.className="shooting-star";
    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.top=Math.random()*200+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
},2000);

/* ✨ CLICK NORMAL */
document.addEventListener("click",(e)=>{
    for(let i=0;i<8;i++){
        let s=document.createElement("div");
        s.className="spark";
        s.innerHTML="✨";
        s.style.left=e.clientX+"px";
        s.style.top=e.clientY+"px";
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1000);
    }
});

/* 🪐 CLICK SATURNO = MODO WOW */
document.getElementById("saturn").addEventListener("click",(e)=>{

    let stars = document.querySelector(".stars");

    // activar brillo fuerte
    stars.classList.add("boost");
    setTimeout(()=>stars.classList.remove("boost"),1200);

    // explosión global
    for(let i=0;i<80;i++){
        let s = document.createElement("div");
        s.className = "superSpark";
        s.innerHTML = Math.random()>0.5 ? "✨" : "💖";

        let x = (Math.random()*window.innerWidth - window.innerWidth/2) + "px";
        let y = (Math.random()*window.innerHeight - window.innerHeight/2) + "px";

        s.style.setProperty("--x", x);
        s.style.setProperty("--y", y);

        s.style.left = e.clientX + "px";
        s.style.top = e.clientY + "px";

        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1200);
    }

});
</script>

</body>
</html>
